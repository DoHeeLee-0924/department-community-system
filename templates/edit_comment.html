{% extends 'base.html' %}
{% block content %}
<div class="card">
  <h2>댓글 수정</h2>
  <p class="muted">작성자 본인만 댓글을 수정할 수 있습니다. 관리자는 수정 권한 없이 삭제만 가능합니다.</p>
  <form method="post">
    <label>댓글 내용</label>
    <textarea name="content" required>{{ comment['content'] }}</textarea>
    <button class="btn" type="submit">수정 완료</button>
    <a class="btn light" href="{{ url_for('post_detail', post_id=comment['post_id']) }}">취소</a>
  </form>
</div>
{% endblock %}
