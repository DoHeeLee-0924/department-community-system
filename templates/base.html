<!doctype html>
<html lang="ko">
<head>
  <meta charset="utf-8">
  <title>{% block title %}학과 정보공유 시스템{% endblock %}</title>
  <link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}">
</head>
<body>
  <header>
    <h2>학과 정보공유 시스템</h2>
    <nav>
      <a href="{{ url_for('posts.index') }}">홈</a>
      <a href="{{ url_for('posts.index', mode='trust') }}">신뢰도순</a>
      {% if user %}
        <a href="{{ url_for('posts.write') }}">글쓰기</a>
        {% if user.grade == '관리자' %}
          <a href="{{ url_for('admin.admin_home') }}">관리자</a>
        {% endif %}
        <a href="{{ url_for('auth.logout') }}">로그아웃</a>
      {% else %}
        <a href="{{ url_for('auth.login') }}">로그인</a>
        <a href="{{ url_for('auth.register') }}">회원가입</a>
      {% endif %}
    </nav>
    {% if user %}
      <p class="small">{{ user.profile }} / {{ user.grade }} 등급</p>
    {% endif %}
  </header>

  <main>
    {% for message in get_flashed_messages() %}
      <div class="msg">{{ message }}</div>
    {% endfor %}
    {% block content %}{% endblock %}
  </main>
</body>
</html>
