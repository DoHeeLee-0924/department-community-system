{% extends "base.html" %}
{% block title %}회원가입{% endblock %}
{% block content %}
<div class="card">
  <h2>회원가입</h2>
  <p class="small">회원가입 시 모든 사용자는 신입 등급으로 시작합니다.</p>
  <form method="post">
    <input name="username" placeholder="아이디" required>
    <input name="password" type="password" placeholder="비밀번호" required>
    <input name="name" placeholder="이름">
    <input name="profile" placeholder="프로필 ID" required>
    <button class="btn">가입</button>
  </form>
</div>
{% endblock %}
